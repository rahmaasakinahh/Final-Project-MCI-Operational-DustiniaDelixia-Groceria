version: '3.8'

x-airflow-common:
  &airflow-common
  build: .
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__WEBSERVER__SECRET_KEY=dustinia_mci_2026
    - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
  volumes:
    - ./dags:/opt/airflow/dags
    - ./data:/opt/airflow/data
    - ./sql:/opt/airflow/sql
    - ./logs:/opt/airflow/logs
    - ./credentials:/opt/airflow/credentials
    - ./data/lake:/opt/airflow/data/lake
    - ./data/ge_reports:/opt/airflow/data/ge_reports
  depends_on:
    postgres:
      condition: service_healthy

services:

  # PostgreSQL (metadata Airflow)
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  # Airflow Init
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Admin
      --lastname MCI
      --role Admin
      --email admin@dustinia.com"
    depends_on:
      postgres:
        condition: service_healthy

  # Airflow Webserver (UI)
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init

  # Airflow Scheduler
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init

  # ClickHouse (data warehouse)
  clickhouse-server:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"   # HTTP interface (untuk Metabase)
      - "9000:9000"   # Native interface (untuk clickhouse-driver)
    environment:
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=dustinia2026
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      retries: 5
      start_period: 10s

  # Metabase (dashboard)
  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    environment:
      - MB_DB_TYPE=h2
      - MB_DB_FILE=/metabase-data/metabase.db
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      clickhouse-server:
        condition: service_healthy

volumes:
  postgres_data:
  clickhouse_data:
  metabase_data: